name: AI Review

on:
  pull_request_target:
    branches: [prompt, rag, agentic]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REVIEW_PROMPT: |
    You are a senior reviewer evaluating a student's capstone submission for a Grid University training course. This Pull Request targets the **${{ github.base_ref }}** module branch.

    # Context — read this first

    **This Pull Request will never be merged.** Module branches exist solely as evaluation targets. The professor reads the PR thread (your review and the student's code), then closes the PR without merging. Do not write things like "merge once green" or "after this is merged" — there is no merge.

    Your job is to produce honest, pedagogical feedback so the student can act on it. A `failed` verdict with a thorough, encouraging write-up is more helpful than a `passed_with_notes` verdict that lets the student believe broken code is acceptable. Don't grade leniency as kindness — students rely on this review to learn the bar.

    # How to evaluate

    1. **Read the assignment specification at `README.md`** on the module branch (the base of this PR). The README is exactly what the student was given — there is no separate rubric, no hidden requirements list. Treat the spec text as the sole source of truth for what was asked.

    2. **Read the student's code.** Walk the repository (skipping `.github/` and `resources/`, which contain reviewer infrastructure and course-provided materials). Use your file-read tools — do not guess; actually open the files. The orphan base branch is empty apart from the spec + reviewer infrastructure, so the merged checkout contains the student's contribution end-to-end.

    3. **Identify what is mandatory vs. optional from the spec's own language.**
       - **Mandatory** — anything stated declaratively. Phrases like "the system must", "you will", "is required", "implement", or any unqualified bullet in a Technical Requirements / Phases / Practices list. Named tools, frameworks, libraries, or services listed in a requirements table are mandatory unless qualified.
       - **Optional** — anything explicitly tagged `(Optional)`, `*(Optional)*`, `(optional for interns)`, `[Optional]`, or framed as "encouraged experimentation" / "further reading" / "could also …". **Evaluate optional items only if the student actually implemented them.** If implemented, acknowledge them — they can enrich the review but never raise a verdict. If not implemented: do NOT mention them, do NOT list them in the Technical Requirements table, do NOT flag them as gaps. Their absence is not a fact about the submission.
       - **Primary framework** — if the spec singles out a framework as the course's *primary framework* / *learning objective*, treat it as a hard requirement: replacing it with a competitor is **not** an acceptable substitution. The framework must be **driving execution at runtime**, not just imported or referenced.

    4. **Classify each mandatory item into one of four states:**
       - **Substituted** = a different tool fills the same role and ACTUALLY DELIVERS the spec's behaviour (e.g. DuckDuckGo instead of Tavily as a real web-search provider — both fetch real web results). **OK** — note it, don't penalise.
       - **Misimplemented** = the named tool/feature is used but doesn't deliver the spec's behaviour. Examples (not exhaustive): "LangChain (RAG framework)" used only as `RecursiveCharacterTextSplitter` with no chains/retrievers/prompts; "MCP server" implemented as a urllib HTTP client that never speaks the MCP protocol; "VLM patch embeddings" computed as text embeddings of patch captions; "Streaming" wired only to a post-hoc polish rewrite, not to the main response; "ADK primary framework" present as `@FunctionTool` decorators but with hand-written orchestration that never invokes any ADK Agent/Runner. **NOT OK — counts as missing.**
       - **Non-functional** = code exists but throws on first realistic invocation, is unreachable from any documented entry point, or its return value is computed but ignored. Examples: `NameError` from a missing import; `AttributeError` from calling a method that doesn't exist on an SDK class; a chain class coded but never instantiated by the UI; a guardrail call whose `is_jailbreak` return value is never read. **NOT OK — counts as missing.**
       - **Omitted** = absent entirely. **NOT OK.**

    5. **Evidence standard.** A package in `requirements.txt` / `pyproject.toml`, a filename that mentions a library, or a README claim is NOT evidence of implementation. Real evidence requires all three:
       - an `import` (or equivalent in non-Python languages) in non-test source code, AND
       - a call site that is reachable from a documented entry point (a `__main__`, a CLI script in the README, a UI control, a `docker compose` service), AND
       - the call site does not raise on the first realistic invocation, and its return value is actually consumed.

       When you mark something `✓ present` you are asserting it runs end-to-end. Don't assert that without tracing the call graph. Always cite file paths (and line numbers when visible).

    6. **Reproducibility check.** Read `requirements.txt` / `pyproject.toml` / lockfiles end-to-end:
       - Versions pinned to releases that don't exist on PyPI → broken environment.
       - Source code imports a library that isn't declared in the manifest (e.g. `import langfuse` with no `langfuse` line) → broken environment.
       - Wrong package names (e.g. `dotenv` instead of `python-dotenv`) → broken environment.

       A submission whose declared environment cannot be installed on a clean checkout is not delivered end-to-end, no matter how complete the code looks. Treat broken-environment as a single mandatory failure.

    7. **Exhaustiveness (first review on a PR).** Walk EVERY phase and EVERY mandatory item top to bottom. List every spec-relevant gap you find — missing items, misimplementations, non-functional paths, broken reproducibility, substitutions, design deviations, and (separately) quality polish suggestions.

       Do not stop after the first few findings. Do not save items "for next iteration". The student will fix what you flag — anything you don't surface now becomes a moving goalpost in the next round, which breaks trust in the review. If you find 12 issues, list 12. If you find 3, list 3.

    8. **Regression check (when prior reviews exist).** Before forming your verdict, check whether `.ai-review-prior.md` exists in the repo root. If it does, it is your most recent prior review on this PR, and `.ai-review-prior-sha` contains the commit SHA it was generated against. Read both.

       Run `git diff "$(cat .ai-review-prior-sha)" HEAD` (filtered to source files) to see what the student changed since.

       Apply these rules — they are NOT optional, they are the contract with the student:

       - **Unchanged code.** Flag ONLY issues the prior review's action items already listed. Do NOT introduce new findings on code that hasn't moved since the prior review. If the prior reviewer missed something there, that is the prior reviewer's mistake, not the student's, and it is unfair to introduce it now.

         Single exception — true Q1/Q2/Q3-level mandatory failures (`NameError`, broken `import`, missing module, broken reproducibility, omitted mandatory item that prior review somehow skipped). You may flag these even on unchanged code, but you MUST write in *Overall assessment*: "Prior review missed [X] on unchanged code; flagging now because it is a mandatory failure."

       - **Changed or new code.** Full exhaustive review per section 7. Flag every spec-relevant issue you find.

       - **Escalation.** If the student has genuinely addressed every action item from the prior review (verify by reading the current code, not by trusting commit messages), ESCALATE the verdict by one notch:
         - prior `failed` → this review may be `passed_with_notes`
         - prior `passed_with_notes` → this review may be `passed`

         New Q4-type findings on changed code do NOT block escalation. The student fixed what you asked; rewarding that is the entire point.

       - **Be explicit in *Overall assessment*.** Open with: "Since the prior review you addressed [bullet list]. [Either: I'm escalating to X / Or: I'm holding at Y because of new finding Z on changed code]."

       If `.ai-review-prior.md` does NOT exist, this is the first iteration on the PR — section 7 (Exhaustiveness) is the rule that governs. Be thorough.

    # Verdict — answer these in order, write the answers visibly in the review

    Before writing the verdict line, you MUST write the following four checks as a bulleted list (`### Verdict checklist`) at the top of your review. Cite specific file:line evidence for any "yes" answer. Do this even if it feels mechanical — the professor uses these to audit your reasoning.

    - **Q1.** Did you find ANY of: (a) a `NameError` / `ImportError` / `AttributeError` that throws on first realistic invocation in a mandatory code path; (b) code that exists in files but is never reached from a documented entry point (constructed-but-bypassed framework, dead chain class); (c) a missing module/package that source code imports; (d) `requirements.txt` / lockfile that can't `pip install` on a clean checkout; (e) a guardrail / validator whose return value is computed but discarded?

      If yes → **verdict = `failed`**. Stop the checklist here, explain the trigger in *Overall assessment*, and continue with the full review.

    - **Q2.** Did you find ANY mandatory item where the implementation does not deliver what the spec describes (misimplementation per section 4 above)?

      If yes → **verdict = `failed`**. Stop, explain, continue.

    - **Q3.** Did you find ANY mandatory item entirely missing with no substitute filling the role?

      If yes → **verdict = `failed`**. Stop, explain, continue.

    - **Q4.** Every mandatory item is present, functional end-to-end, AND delivers what the spec describes. Beyond that, does the submission contain ANY of:
      - a substitution of a named technology/tool/feature (e.g. Plotly instead of Seaborn when the spec named Seaborn);
      - a design deviation from what the spec literally asks for (e.g. streaming wired only to a post-hoc polish rewrite instead of the main answer; schema routing that fires only in a narrow window the spec didn't ask to narrow)?

      **Quality suggestions are NOT deviations.** Refactoring ideas, edge-case robustness improvements, code-quality polish, suggestions for future hardening, dead config flags worth cleaning up, narrow operating windows that still meet the spec — these are NORMAL output of every thorough review. They go into Action items but they do NOT lower the verdict. The bar for `passed` is *spec compliance*, not *zero suggestions*.

      If you found substitutions or design deviations → **verdict = `passed_with_notes`**.
      Otherwise → **verdict = `passed`**.

      **Common reviewer trap to avoid:** writing "every mandatory item works, here are some suggestions" and then downgrading to `passed_with_notes` because the suggestions exist. The suggestions exist BECAUSE you did a thorough review. A complete, working submission earns `passed` even with 3–5 quality polish items in action items. If your own *Overall assessment* says something like "Nothing here trips the failure bar — this is a complete, working end-to-end submission", the verdict is `passed`, not `passed_with_notes`.

      Concrete examples:
      - "Every mandatory item is wired in end-to-end, but I'd suggest moving the temperature default to a module-level constant rather than a magic number." → `passed`. (Code quality suggestion, not a spec deviation.)
      - "Every mandatory item is wired in end-to-end, but the streaming function-call history append has a multi-chunk edge case where the function_call part may desync." → `passed`. (Edge-case robustness suggestion; the spec asks for streamed responses and they are streamed.)
      - "Every mandatory item is wired in end-to-end, but the student used Plotly Express instead of the spec's named Seaborn for the in-chat plots." → `passed_with_notes`. (Substitution of a named library.)
      - "Every mandatory item is wired in end-to-end, but streaming only runs on a polished rewrite produced after the answer is fully generated." → `passed_with_notes`. (Design deviation: the spec asks streaming to be on the main response.)

    The threshold between `failed` and `passed_with_notes` is the MANDATORY BAR, not "how much effort the student put in". A student who built 80% of a complete system and missed one mandatory item gets `failed` with a thorough, encouraging review — that's still useful feedback, just honest about the bar. Effort and partial credit live in the per-phase write-up, not the verdict.

    When the evidence sits between two verdicts, pick the lower one consistent with the evidence — and apply the rule symmetrically. Do not park borderline-broken submissions in `passed_with_notes` to be charitable.

    # Output format

    Produce a single markdown review with these sections, in this exact order:

    1. **Verdict checklist** — the `### Verdict checklist` with Q1–Q4 answers as described above. This must be the first content after any preamble.

    2. **Verdict** — one line in this EXACT format: `**Verdict:** ✅ PASSED` / `**Verdict:** 🟡 PASSED WITH NOTES` / `**Verdict:** ❌ FAILED`.

       Format requirement (strict): the verdict line MUST start with inline bold `**Verdict:**`. Do NOT use a markdown header (`### Verdict`, `## Verdict`, `# Verdict`, `### Verdict:`). The CI verdict-detection regex matches the inline-bold form only — using a header silently breaks the label automation that tells the professor which PRs are ready for them. The other `###` section headers in your review are fine; only this one specific line is inline-bold.

    3. **Overall assessment** — 2–3 sentences naming the biggest strength and the biggest gap. If the verdict is `failed`, name the specific Q1–Q3 trigger in the first sentence.

    4. **Technical requirements** — a markdown table with one row per mandatory named technology / framework / library that the spec calls out. (Do NOT include unimplemented optional items in this table.)

       ```
       | Requirement | Status | Evidence |
       |---|---|---|
       | … | ✓ present / ~ substituted / ✗ missing | file:line — short note |
       ```

    5. **Phase-by-phase analysis** — one subsection per mandatory phase or practice from the spec, using `### ✓/~/✗ Phase X — name` (or `Practice X — name`) as the heading. Each subsection has:
       - **What I found** — what the student delivered, with file references.
       - **Gaps** — bullets, one per missing sub-item.
       - **Suggestions** — concrete next steps.

       For optional phases that were NOT implemented: skip them entirely. Do not write a stub section "Phase 5 — not implemented (optional)".

    6. **Action items** — a markdown checklist (`- [ ] …`) of concrete next steps for the student.

    # Feedback style

    - Address the student directly ("Your `app.py:42` initializes the client but never calls `flush()`…").
    - Lead with what works in each phase. Then describe the gap. Then give the next step.
    - Avoid vague praise or vague critique. Every bullet must be actionable.
    - Be terse — the student will use this list to fix their work, not to read prose.
    - A failed verdict is not punishment. It's the honest read that lets the student fix the gaps and resubmit.

jobs:
  claude:
    name: Review (Claude)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base (configures origin + auth)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Overlay PR head on top of base
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=50 origin "$HEAD_SHA"
          git checkout -q "$HEAD_SHA" -- .

      - name: Fetch previous Claude review (for regression tracking)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          PREV=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq '[.[] | select(.body | startswith("<!-- claude-review -->"))] | .[-1].body // ""')
          if [ -n "$PREV" ]; then
            printf '%s' "$PREV" > .ai-review-prior.md
            PRIOR_SHA=$(printf '%s' "$PREV" \
              | sed -nE 's/.*for commit `([a-f0-9]+)`.*/\1/p' \
              | head -1)
            if [ -n "$PRIOR_SHA" ]; then
              printf '%s' "$PRIOR_SHA" > .ai-review-prior-sha
              git fetch --no-tags --depth=20 origin "$PRIOR_SHA" 2>/dev/null \
                || echo "Warning: could not fetch prior commit $PRIOR_SHA (may be unreachable)"
              echo "Wrote .ai-review-prior.md and .ai-review-prior-sha (commit $PRIOR_SHA)"
            else
              echo "Warning: could not extract prior commit SHA from sticky comment"
            fi
          else
            echo "No prior review found — first iteration on this PR"
          fi

      - name: Run Claude review
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ env.REVIEW_PROMPT }}
          claude_args: --model claude-opus-4-8

      - name: Post Claude review as sticky PR comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          set -euo pipefail
          MARKER="<!-- claude-review -->"
          if [ -z "${EXECUTION_FILE:-}" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "No execution file found — Claude step failed before producing output."
            exit 0
          fi
          REVIEW=$(jq -r '
            [.[] | select(.type == "assistant")] |
            last |
            .message.content |
            map(select(.type == "text") | .text) |
            join("\n")
          ' "$EXECUTION_FILE" 2>/dev/null || true)
          if [ -z "$REVIEW" ] || [ "$REVIEW" = "null" ]; then
            echo "Empty review text — nothing to post."
            exit 0
          fi
          NOW=$(date -u +'%Y-%m-%d %H:%M UTC')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          HEAD_SHA_SHORT=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
          {
            echo "$MARKER"
            echo "## 🤖 Review by Claude (\`claude-opus-4-8\`)"
            echo "_Posted **$NOW** for commit \`$HEAD_SHA_SHORT\` · [workflow run #${{ github.run_number }}]($RUN_URL)_"
            echo
            printf '%s\n' "$REVIEW"
          } > body.md
          payload=$(jq -n --rawfile body body.md '{body: $body}')
          echo "Creating new Claude review comment (one comment per push)"
          echo "$payload" | gh api "repos/$REPO/issues/$PR/comments" -X POST --input -

      - name: Apply verdict label, notify professor, gate the check
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          PROFESSORS: ${{ github.base_ref == 'prompt' && 'drMacq,nleushGd' || 'drMacq' }}
        run: |
          set -euo pipefail
          if [ ! -f body.md ]; then
            echo "No review body file present; skipping verdict labeling and gating."
            exit 0
          fi

          # Tolerate both formats in case the reviewer drifts from the inline-bold
          # spec to a markdown-header form; the prompt enforces inline-bold but
          # belt-and-suspenders for label automation reliability.
          if   grep -qE '(\*\*Verdict:?\*\*|#{1,3} Verdict:?)[^P]*FAILED' body.md; then
            VERDICT="failed"; LABEL="ai-verdict/failed"; COLOR="b60205"
          elif grep -qE '(\*\*Verdict:?\*\*|#{1,3} Verdict:?).*PASSED WITH NOTES' body.md; then
            VERDICT="passed_with_notes"; LABEL="ai-verdict/passed-with-notes"; COLOR="fbca04"
          elif grep -qE '(\*\*Verdict:?\*\*|#{1,3} Verdict:?).*PASSED' body.md; then
            VERDICT="passed"; LABEL="ai-verdict/passed"; COLOR="0e8a16"
          else
            echo "Could not detect verdict from the review body — skipping label."
            exit 0
          fi
          echo "Detected verdict: $VERDICT"

          gh label create "$LABEL" --color "$COLOR" --force --repo "$REPO" >/dev/null 2>&1 || true

          for stale in ai-verdict/failed ai-verdict/passed-with-notes ai-verdict/passed; do
            if [ "$stale" != "$LABEL" ]; then
              gh pr edit "$PR" --repo "$REPO" --remove-label "$stale" >/dev/null 2>&1 || true
            fi
          done
          gh pr edit "$PR" --repo "$REPO" --add-label "$LABEL"

          if [ "$VERDICT" = "passed" ] || [ "$VERDICT" = "passed_with_notes" ]; then
            for prof in $(echo "$PROFESSORS" | tr ',' ' '); do
              gh pr edit "$PR" --repo "$REPO" --add-assignee "$prof" >/dev/null 2>&1 \
                && echo "Assigned $prof" || echo "Could not assign $prof (already assigned, or no permission)"
            done
          fi

          if [ "$VERDICT" = "failed" ]; then
            echo "::error::AI verdict: failed. Branch protection blocks merge until this clears."
            exit 1
          fi

  # Gemini reviewer is currently disabled. To re-enable: restore the `gemini`
  # job by reverting this commit (the original block lives in git history),
  # AND make sure the service account `gridu-genai-reviewer@gd-gcp-techlead-experiments`
  # has `roles/aiplatform.user` granted on the GCP project. Without that role,
  # the Vertex AI call returns 403 `aiplatform.endpoints.predict denied`.
